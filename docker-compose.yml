services:
  bitex-landing:
    image: ${IMAGE}
    container_name: bitex-landing
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://bitex-it.ru}
    ports:
      - "${APP_PORT:-8080}:3000"
    networks:
      - bitex-cms
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  bitex-cms:
    external: true
    name: bitex-cms_default
