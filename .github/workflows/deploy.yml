name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          IMAGE_NAME_LC="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          IMAGE="$REGISTRY/$IMAGE_NAME_LC:${{ github.sha }}"
          docker build \
            --build-arg VITE_SITE_URL="${{ secrets.VITE_SITE_URL }}" \
            -t "$IMAGE" \
            -t "$REGISTRY/$IMAGE_NAME_LC:latest" \
            .

      - name: Push image
        run: |
          IMAGE_NAME_LC="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          docker push "$REGISTRY/$IMAGE_NAME_LC:${{ github.sha }}"
          docker push "$REGISTRY/$IMAGE_NAME_LC:latest"

      - name: Export image name
        id: meta
        run: |
          IMAGE_NAME_LC="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "image=$REGISTRY/$IMAGE_NAME_LC:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Copy compose file
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT:-22}" docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"

      - name: Write server environment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          {
            echo "IMAGE=$IMAGE"
            echo "APP_PORT=${APP_PORT:-8080}"
          } > .env.deploy
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT:-22}" .env.deploy "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"

      - name: Restart container
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            cd '$DEPLOY_PATH'
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          "
